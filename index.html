<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard</title>
    <style>
    body, html {
        height: 100%;
        margin: 0;
        font-family: 'Arial', sans-serif;
    }

    .login-container {
        background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                    url('background1.jpeg'); 
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        justify-content: center; 
        align-items: center;     
    }

    .login-card {
        background: white;
        display: flex; 
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        max-width: 700px; /* Slightly wider to fit the new header */
        width: 90%;
    }

    .card-left {
        flex: 1;
        display: flex;
        align-items: center;
        background-color: #ffffff;
    }

    .card-right {
        flex: 1;
        padding: 40px;
        background-color: #f4f4f4;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    /* --- NEW HEADER SECTION (Outside the button!) --- */
    .card-header {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
    }

    .header-logo {
        width: 50px; /* Try 70px for a clear but balanced look */
        height: auto;
        margin-bottom: 20px;
    }

    .header-text-block h2 {
        margin: 0;
        font-size: 35px;
        color: #2c3e50;
    }

    .header-text-block p {
        margin: 0;
        font-size: 23px;
        color: #7f8c8d;
    }
    /* ----------------------------------------------- */

    input {
        margin: 10px 0;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .sign-in-btn {
        background-color: #8b4513; 
        color: white;
        padding: 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
    }

    .footer-links {
        margin-top: 15px;
        text-align: center;
    }

    .footer-links a {
        font-size: 13px;
        color: #8b4513;
        text-decoration: none;
    }
</style> 
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="card-left">
                <img src="Illustration.png" alt="Heritage Building Photo" style="width: 100%; height: auto;">
            </div>
            <div class="card-right">
            <div class="card-header">
                 <img src="logo.png" alt="GeoGuard Shield Logo" class="header-logo">
            <div class="header-text-block">
                <h2>Tagbi GeoGuard</h2>
                <p>Hazard Reporting Platform</p>
        </div>
        </div>
                <input type="text" placeholder="Heritage ID / Email Address">
                <input type="password" placeholder="Password">
                <button class="sign-in-btn">SIGN IN</button>
            <div class="footer-links">
                <a href="register.html">Create an Account</a>
        </div>
        </div>

        </div>
    </div>

</body>
</html>
