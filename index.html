<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        .login-container {
            /* Full screen background image */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('background1.jpeg'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center; 
            align-items: center;     
        }

        .login-card {
            background: white;
            display: flex; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 90%;
        }

        /* This ensures the left side takes up half the card */
        .card-left {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: #ffffff;
        }

        .card-right {
            flex: 1;
            padding: 40px;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        input {
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .sign-in-btn {
            background-color: #8b4513; 
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;

            /* Styling for the new header container */
            .card-header {
             display: flex;         /* Puts logo and text side-by-side */
    align-items: center;  /* Vertically centers them */
    margin-bottom: 30px;  /* Space below the header */
}

/* Specific styling for the shield logo */
.header-logo {
    width: 5px;          /* Adjust size as needed */
    height: 5px;
    margin-right: 15px;  /* Space between logo and text */
}

/* Text alignment within the header */
.header-text-block h2 {
    margin: 0;
    font-size: 24px;      /* Adjust size as needed */
    line-height: 1.2;
}

.header-text-block p {
    margin: 5px 0 0 0;
    font-size: 14px;
    color: #666;          /* Subtler color for the subtitle */
}

        }
    </style> </head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="card-left">
                <img src="Illustration.png" alt="Tagbilaran Heritage Building" style="width: 100%; height: auto;">
            </div>
            <div class="card-right">
            <div class="card-header">
                 <img src="shield_logo.png" alt="GeoGuard Shield Logo" class="header-logo">
            <div class="header-text-block">
                <h2>Tagbi GeoGuard</h2>
                <p>Hazard Reporting Platform</p>
        </div>
        </div>
                <input type="text" placeholder="Heritage ID / Email Address">
                <input type="password" placeholder="Password">
                <button class="sign-in-btn">SIGN IN</button>
            <div class="footer-links">
                <a href="#">Create an Account</a>
        </div>
        </div>

        </div>
    </div>

</body>
</html>
