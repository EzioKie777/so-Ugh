<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard - Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --primary: #8b4513; 
            --khaki-bg: #f0e68c; /* Khaki shade */
            --khaki-light: #f5f5dc; /* Beige/Cream */
            --text-main: #2c3e50;
            --border: #d4c5a0;
        }

        body, html { 
            height: 100%; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            background-color: var(--khaki-bg); /* Global Khaki Background */
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 320px; 
            height: 100vh; 
            background: #fff;
            display: flex; 
            flex-direction: column; 
            border-right: 2px solid var(--border);
            z-index: 1001;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar-header { padding: 25px 20px; background: var(--khaki-light); border-bottom: 1px solid var(--border); }
        
        .sidebar-nav { padding: 15px 10px; flex-grow: 1; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px;
            cursor: pointer; border-radius: 8px; margin-bottom: 5px;
            color: var(--text-main); font-weight: 500; transition: 0.2s;
        }
        .nav-item:hover { background: var(--khaki-light); }
        .nav-item.active { background: var(--primary); color: white; }

        .sidebar-content { 
            padding: 20px; 
            height: 40%; 
            overflow-y: auto; 
            background: #fafafa; 
            border-top: 1px solid var(--border);
        }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); background: var(--khaki-light); }

        /* --- THE MAP (FIXED) --- */
        #map-container {
            flex-grow: 1;
            position: relative;
            height: 100vh; /* Force height */
            background: #e0e0e0; /* Fallback color if map fails to load */
        }
        #map { 
            width: 100%; 
            height: 100%; /* Ensure it fills the container */
        }

        /* --- MODAL & FAB --- */
        #fab-report {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); color: white; border: none;
            padding: 15px 25px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-card { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; }
        
        /* Form Inputs */
        .report-form select, .report-form textarea { width: 100%; margin-bottom: 12px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size:20px; color:var(--primary);">GeoGuard</h2>
            <small>Tagbilaran Dashboard</small>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-item active" onclick="switchView('center', this)">📡 Command Center</div>
            <div class="nav-item" onclick="switchView('reports', this)">⚠️ Active Reports</div>
            <div class="nav-item" onclick="switchView('heritage', this)">🏛️ Heritage Sites</div>
            <div class="nav-item" onclick="switchView('risk', this)">📊 Risk Analysis</div>
        </nav>

        <div class="sidebar-content" id="sidebarView"></div>

        <div class="sidebar-footer">
            <div style="font-size:14px; font-weight:600;">@RoyGabriel</div>
            <button style="margin-top:10px; width:100%; cursor:pointer;" onclick="location.href='index.html'">Sign Out</button>
        </div>
    </aside>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <button id="fab-report" onclick="toggleModal(true)">+ Report Hazard</button>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <h3>Report Hazard</h3>
            <form id="hazardForm" class="report-form">
                <select id="hType" required>
                    <option value="">Select Type</option>
                    <option value="Flood">Flood</option>
                    <option value="Road Block">Road Block</option>
                    <option value="Heritage Damage">Heritage Site Damage</option>
                </select>
                <textarea id="hDesc" placeholder="Describe the hazard..." rows="4" required></textarea>
                <button type="submit" class="btn-send" id="hBtn">Submit Report</button>
                <button type="button" onclick="toggleModal(false)" style="background:none; border:none; color:grey; width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize Map - Center on Tagbilaran
        // If the map is still blank, make sure you have an internet connection to load the tiles!
        const map = L.map('map').setView([9.6412, 123.8566], 14);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Fix for Leaflet maps not rendering correctly in flex containers
        setTimeout(() => { map.invalidateSize(); }, 200);

        let myCoords = { lat: 9.6412, lng: 123.8566 };

        navigator.geolocation.getCurrentPosition(p => {
            myCoords = { lat: p.coords.latitude, lng: p.coords.longitude };
            map.setView([myCoords.lat, myCoords.lng], 16);
            L.marker([myCoords.lat, myCoords.lng]).addTo(map).bindPopup("You are here").openPopup();
        }, () => {
            console.log("Geolocation blocked or failed.");
        });

        function toggleModal(show) {
            document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
        }

        function switchView(view, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            const cont = document.getElementById('sidebarView');
            cont.innerHTML = `<h4>${view}</h4><p style="font-size:13px">Viewing data for Tagbilaran City...</p>`;
        }

        document.getElementById('hazardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('hBtn');
            btn.innerText = "Saving...";
            
            const payload = {
                type: document.getElementById('hType').value,
                description: document.getElementById('hDesc').value,
                lat: myCoords.lat,
                lng: myCoords.lng
            };

            try {
                const res = await fetch('/api/report-hazard', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    toggleModal(false);
                    L.circle([payload.lat, payload.lng], {color: 'red', radius: 40}).addTo(map).bindPopup(payload.type);
                    document.getElementById('hazardForm').reset();
                }
            } catch (err) { alert("Failed to connect to server."); }
            
            btn.innerText = "Submit Report";
        });

        window.onload = () => { switchView('Command Center', document.querySelector('.nav-item')); };
    </script>
</body>
</html>
