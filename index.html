<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Engineering Portfolio</title>
    <style>
    /* This targets the whole page */
    body {
        background-color: #0f172a; /* Dark navy blue */
        color: #e2e8f0;            /* Soft white text */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 20px;
    }

    /* Styling the header */
    header {
        text-align: center;
        padding: 40px 0;
        border-bottom: 2px solid #38bdf8; /* Bright blue line */
        margin-bottom: 30px;
    }

    h1 {
        color: #38bdf8;
        margin: 0;
    }

    /* Styling the sections */
    section {
        background: #1e293b;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    h2 {
        color: #fbbf24; /* Amber color for headings */
        border-left: 5px solid #fbbf24;
        padding-left: 10px;
    }

    ul {
        list-style-type: square;
    }
</style>
</head>
<body>

    <header>
        <h1>Welcome to My Web Space</h1>
        <p>Computer Engineering Student | Developer | Maker</p>
    </header>

    <main>
        <section id="about">
            <h2>About Me</h2>
            <p>I enjoy building things with code and hardware.</p>
        </section>

        <section id="projects">
            <h2>Current Projects</h2>
            <ul>
                <li><strong>Gpad:</strong> A smart-surface gesture mouse pad.</li>
                <li><strong>Robotic Boat:</strong> A 3D-printed boat using ATtiny85.</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>Created in 2026</p>
    </footer>

</body>
</html>
