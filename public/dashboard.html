<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard - Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --primary: #8b4513; 
            --primary-dark: #5d2e0d;
            --bg-light: #fafafa;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --border: #eeeeee;
        }

        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 320px; height: 100vh; background: #fff;
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
            z-index: 1001;
        }

        .sidebar-header { padding: 25px 20px; display: flex; align-items: center; gap: 12px; }
        .nav-logo { width: 45px; height: auto; }
        
        .sidebar-nav { padding: 10px; flex-grow: 1; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px;
            text-decoration: none; color: var(--text-main); font-weight: 500;
            border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: 0.2s;
        }
        .nav-item:hover { background: #fdf5ef; color: var(--primary); }
        .nav-item.active { background: var(--primary); color: white; }

        .sidebar-content { padding: 20px; border-top: 1px solid var(--border); height: 40%; overflow-y: auto; background: var(--bg-light); }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
        .user-box { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar { width: 35px; height: 35px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .logout-btn { width: 100%; padding: 8px; background: none; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .logout-btn:hover { color: #e74c3c; border-color: #ffcccc; }

        /* --- MAP & FAB --- */
        #map { flex-grow: 1; height: 100vh; z-index: 1; }

        #fab-report {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); color: white; border: none;
            padding: 15px 25px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-card { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        .report-form input, .report-form select, .report-form textarea { width: 100%; margin-bottom: 12px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" class="nav-logo">
            <div><h2 style="margin:0; font-size:18px;">GeoGuard</h2><small style="color:var(--text-sub)">Tagbilaran City</small></div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-item active" onclick="switchView('center', this)">📡 Command Center</div>
            <div class="nav-item" onclick="switchView('reports', this)">⚠️ Active Reports</div>
            <div class="nav-item" onclick="switchView('heritage', this)">🏛️ Heritage Sites</div>
            <div class="nav-item" onclick="switchView('risk', this)">📊 Risk Analysis</div>
        </nav>

        <div class="sidebar-content" id="sidebarView">
            </div>

        <div class="sidebar-footer">
            <div class="user-box">
                <div class="avatar" id="uInit">U</div>
                <div><div id="uName" style="font-size:14px; font-weight:600;">@username</div><small style="color:var(--text-sub)">Responder</small></div>
            </div>
            <button class="logout-btn" onclick="location.href='index.html'">Sign Out</button>
        </div>
    </aside>

    <div id="map"></div>

    <button id="fab-report" onclick="toggleModal(true)">+ Report Hazard</button>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 style="margin:0">Report Hazard</h3>
                <span style="cursor:pointer" onclick="toggleModal(false)">&times;</span>
            </div>
            <form id="hazardForm" class="report-form">
                <select id="hType" required>
                    <option value="">Select Type</option>
                    <option value="Flood">Flood</option>
                    <option value="Road Block">Road Block</option>
                    <option value="Heritage Site Damage">Heritage Site Damage</option>
                </select>
                <textarea id="hDesc" placeholder="What's happening?" rows="4" required></textarea>
                <button type="submit" class="btn-send" id="hBtn">Submit Report</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([9.6412, 123.8566], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let myCoords = { lat: 9.6412, lng: 123.8566 };

        navigator.geolocation.getCurrentPosition(p => {
            myCoords = { lat: p.coords.latitude, lng: p.coords.longitude };
            map.setView([myCoords.lat, myCoords.lng], 16);
            L.marker([myCoords.lat, myCoords.lng]).addTo(map).bindPopup("You are here").openPopup();
        });

        function toggleModal(show) {
            document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
        }

        function switchView(view, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            const cont = document.getElementById('sidebarView');

            if(view === 'reports') {
                cont.innerHTML = `<h4>Active Reports</h4><div id="list">Fetching live data...</div>`;
                fetchReports(); 
            } else if(view === 'center') {
                cont.innerHTML = `<h4>Status</h4><p style="font-size:13px">All systems operational. Map shows local Tagbilaran activity.</p>`;
            } else {
                cont.innerHTML = `<h4>${view}</h4><p>Data layer loading...</p>`;
            }
        }

        async function fetchReports() {
            try {
                const res = await fetch('/api/hazards');
                const data = await res.json();
                const list = document.getElementById('list');
                list.innerHTML = data.map(h => `
                    <div style="background:#fff; padding:10px; margin-bottom:5px; border-radius:5px; border-left:4px solid var(--primary);">
                        <strong>${h.type}</strong><br><small>${h.description}</small>
                    </div>
                `).join('');
                
                // Also plot them on the map
                data.forEach(h => {
                    L.circle([h.lat, h.lng], {color: 'red', radius: 30}).addTo(map).bindPopup(h.type);
                });
            } catch (e) { console.error("Error fetching", e); }
        }

        document.getElementById('hazardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('hBtn');
            btn.innerText = "Syncing...";
            
            const payload = {
                type: document.getElementById('hType').value,
                description: document.getElementById('hDesc').value,
                lat: myCoords.lat,
                lng: myCoords.lng
            };

            const res = await fetch('/api/report-hazard', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                toggleModal(false);
                L.circle([payload.lat, payload.lng], {color: 'red', radius: 40}).addTo(map);
                document.getElementById('hazardForm').reset();
            }
            btn.innerText = "Submit Report";
        });

        window.onload = () => {
            switchView('center', document.querySelector('.nav-item'));
            document.getElementById('uName').innerText = "@RoyGabriel"; // Replace with session data later
            document.getElementById('uInit').innerText = "R";
        };
    </script>
</body>
</html>
